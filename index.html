<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>HoneyDo 🍯</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { margin: 0; padding: 0; background: #FFFDF4; -webkit-text-size-adjust: 100%; }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance:none; margin:0 }
    input, button, select, textarea { font-family: inherit; }
    .hive-scroll::-webkit-scrollbar { height: 7px; width: 7px; }
    .hive-scroll::-webkit-scrollbar-track { background: #FDF5DC; border-radius: 4px; }
    .hive-scroll::-webkit-scrollbar-thumb { background: #E8C84A; border-radius: 4px; }
    .hive-scroll::-webkit-scrollbar-thumb:hover { background: #C4956A; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(18px);} to { opacity:1; transform:translateY(0);} }
    .hive-scroll svg * { -webkit-user-select: none; user-select: none; }
    .hive-scroll svg { -webkit-touch-callout: none; -webkit-user-select: none; }
    svg { -webkit-touch-callout: none !important; -webkit-user-select: none !important; user-select: none !important; }
    svg * { -webkit-touch-callout: none !important; -webkit-user-select: none !important; user-select: none !important; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react" data-plugins="transform-class-properties">
    const { useState, useEffect, useRef } = React;

    const firebaseApp = firebase.initializeApp({ apiKey: "AIzaSyCo248atCeEMcG-g-kda7px29XjLXldc5Q", authDomain: "honeydo-9dd1a.firebaseapp.com", databaseURL: "https://honeydo-9dd1a-default-rtdb.firebaseio.com", projectId: "honeydo-9dd1a", storageBucket: "honeydo-9dd1a.firebasestorage.app", messagingSenderId: "258140375145", appId: "1:258140375145:web:fb6253397999abd1393af8" });
    const db   = firebase.database();
    const auth = firebase.auth();

    // ── Per-user save/load (keys scoped to userId) ──────────────────────────
    const KEYS = ["hd4-tasks","hd4-hives","hd4-pos","hd4-pollen","hd4-unlocked","hd4-hat","hd4-intention","hd4-weekly","hd4-habits","hd4-dreams"];

    function makeStorage(uid) {
      const prefix = "users/" + uid + "/";
      return {
        save: (k, v) => {
          try { localStorage.setItem(uid+k, JSON.stringify(v)); } catch(e) {}
          db.ref(prefix + k).set(JSON.stringify(v));
        },
        load: (k, def) => {
          try { const l = localStorage.getItem(uid+k); if (l) return JSON.parse(l); } catch(e) {}
          return def;
        },
        preload: () => Promise.all(KEYS.map(k =>
          db.ref(prefix + k).once("value").then(snap => {
            const val = snap.val();
            if (val !== null) { try { localStorage.setItem(uid+k, val); } catch(e) {} }
          }).catch(()=>{})
        )),
        subscribe: (k, cb) => {
          let first = true;
          db.ref(prefix + k).on("value", snap => {
            if (first) { first = false; return; }
            const val = snap.val();
            if (val !== null) { try { cb(JSON.parse(val)); } catch(e) {} }
          });
        }
      };
    }

    // ── Login Screen ─────────────────────────────────────────────────────────
    function LoginScreen({ onLogin }) {
      const [username, setUsername] = useState("");
      const [password, setPassword] = useState("");
      const [isNew,    setIsNew]    = useState(false);
      const [err,      setErr]      = useState("");
      const [loading,  setLoading]  = useState(false);

      const BROWN = "#5C3317"; const GOLD = "#E8C840"; const HEX_COLOR = "#FFFFC5";
      const WHITE = "#FFFFFF"; const PARCHMENT = "#FDF5DC";

      // Firebase auth uses email format internally — we append @honeydo.app so users
      // just type a plain username, no real email needed
      const toEmail = u => u.trim().toLowerCase().replace(/\s+/g,"_") + "@honeydo.app";

      const handle = async () => {
        if (!username.trim() || !password.trim()) { setErr("Please fill in both fields!"); return; }
        if (password.length < 6) { setErr("Password must be at least 6 characters!"); return; }
        setLoading(true); setErr("");
        const email = toEmail(username);
        try {
          if (isNew) {
            await auth.createUserWithEmailAndPassword(email, password);
          } else {
            await auth.signInWithEmailAndPassword(email, password);
          }
          // onLogin called via onAuthStateChanged in App
        } catch(e) {
          if (e.code === "auth/user-not-found" || e.code === "auth/invalid-credential") {
            setErr("Username not found! Did you mean to sign up?");
          } else if (e.code === "auth/wrong-password" || e.code === "auth/invalid-login-credentials") {
            setErr("Wrong password, try again!");
          } else if (e.code === "auth/email-already-in-use") {
            setErr("That username is taken, try another!");
          } else if (e.code === "auth/too-many-requests") {
            setErr("Too many attempts, wait a moment!");
          } else {
            setErr("Something went wrong, try again!");
          }
          setLoading(false);
        }
      };

      return (
        <div style={{ minHeight:"100vh", background: PARCHMENT, display:"flex", alignItems:"center", justifyContent:"center", padding: 20 }}>
          <div style={{ background: WHITE, borderRadius: 28, padding: "36px 32px", width: "100%", maxWidth: 380,
            boxShadow:"0 8px 40px rgba(92,51,23,0.13)", border:"1.5px solid #F0E070",
            animation:"fadeIn 0.4s ease" }}>

            {/* Logo */}
            <div style={{ textAlign:"center", marginBottom: 28 }}>
              <svg width="52" height="52" viewBox="0 0 60 60" style={{ marginBottom: 8 }}>
                <polygon points="30,2 56,16 56,44 30,58 4,44 4,16" fill={HEX_COLOR} stroke="#C4956A" strokeWidth="3"/>
                <ellipse cx="30" cy="30" rx="10" ry="12" fill="#E8C84A" opacity="0.7"/>
                <ellipse cx="30" cy="26" rx="5" ry="3" fill="white" opacity="0.3"/>
              </svg>
              <h1 style={{ fontFamily:"'Dancing Script',cursive", color:BROWN, fontSize:36, fontWeight:700, margin:0, fontStyle:"italic" }}>HoneyDo</h1>
              <p style={{ fontFamily:"'Jost',sans-serif", color:"#C4956A", fontSize:13, margin:"4px 0 0" }}>your cozy little hive 🍯</p>
            </div>

            {/* Toggle */}
            <div style={{ display:"flex", background:HEX_COLOR, borderRadius:12, padding:3, border:"1.5px solid #E8D84A", marginBottom:22 }}>
              {[["Sign In", false],["Sign Up", true]].map(([label, val]) => (
                <button key={label} onClick={() => { setIsNew(val); setErr(""); }} style={{
                  flex:1, background: isNew===val ? WHITE : "transparent",
                  border:"none", borderRadius:9, padding:"7px 0", cursor:"pointer",
                  fontWeight:600, fontSize:13, color:BROWN, fontFamily:"'Jost',sans-serif",
                  transition:"all 0.18s", boxShadow: isNew===val ? "0 1px 8px rgba(0,0,0,0.09)" : "none"
                }}>{label}</button>
              ))}
            </div>

            {/* Fields */}
            {[["Username", username, setUsername, "text", "pick a fun username!"],
              ["Password", password, setPassword, "password", "at least 6 characters"]
            ].map(([label, val, setter, type, placeholder]) => (
              <div key={label} style={{ marginBottom:14 }}>
                <div style={{ fontSize:11, fontWeight:700, color:BROWN, fontFamily:"'Jost',sans-serif", marginBottom:5, textTransform:"uppercase", letterSpacing:"0.06em" }}>{label}</div>
                <input
                  type={type}
                  value={val}
                  onChange={e => setter(e.target.value)}
                  onKeyDown={e => e.key==="Enter" && handle()}
                  placeholder={placeholder}
                  style={{
                    width:"100%", padding:"11px 14px", borderRadius:12,
                    border:`1.5px solid ${err ? "#E8A0A0" : "#F0E070"}`,
                    background: PARCHMENT, fontSize:14, color:BROWN,
                    fontFamily:"'Jost',sans-serif", outline:"none",
                  }}
                />
              </div>
            ))}

            {/* Error */}
            {err && <div style={{ background:"#FFF0F0", border:"1px solid #E8C0C0", borderRadius:10, padding:"8px 12px", fontSize:12, color:"#C05050", fontFamily:"'Jost',sans-serif", marginBottom:14 }}>{err}</div>}

            {/* Button */}
            <button onClick={handle} disabled={loading} style={{
              width:"100%", padding:"13px 0", borderRadius:14,
              background: loading ? "#E8D84A" : GOLD,
              border:"none", cursor: loading ? "wait" : "pointer",
              fontWeight:700, fontSize:15, color:BROWN,
              fontFamily:"'Jost',sans-serif", marginTop:4,
              boxShadow:"0 3px 12px rgba(232,200,64,0.35)",
              transition:"all 0.18s",
            }}>
              {loading ? "✦ Loading..." : isNew ? "✦ Create My Hive" : "✦ Enter My Hive"}
            </button>

            <p style={{ textAlign:"center", fontSize:11, color:"#C4956A", fontFamily:"'Jost',sans-serif", marginTop:16, marginBottom:0 }}>
              your username is private — no email needed!
            </p>
          </div>
        </div>
      );
    }

    // ── App Shell (handles auth state) ───────────────────────────────────────
    function App() {
      const [user,    setUser]    = useState(undefined); // undefined = loading
      const [storage, setStorage] = useState(null);
      const [ready,   setReady]   = useState(false);

      useEffect(() => {
        const unsub = auth.onAuthStateChanged(async u => {
          if (u) {
            const s = makeStorage(u.uid);
            await Promise.race([s.preload(), new Promise(r => setTimeout(r, 4000))]);
            window.hdSave = s.save;
            window.hdLoad = s.load;
            window.hdSubscribe = s.subscribe;
            window.hdPreloaded = {}; // preload already put data in localStorage keyed by uid
            setStorage(s);
            setUser(u);
            setReady(true);
          } else {
            setUser(null);
            setReady(false);
          }
        });
        return unsub;
      }, []);

      // Loading spinner
      if (user === undefined) return (
        <div style={{ minHeight:"100vh", background:"#FDF5DC", display:"flex", alignItems:"center", justifyContent:"center" }}>
          <div style={{ textAlign:"center" }}>
            <svg width="52" height="52" viewBox="0 0 60 60" style={{ marginBottom:12 }}>
              <polygon points="30,2 56,16 56,44 30,58 4,44 4,16" fill="#FFFFC5" stroke="#C4956A" strokeWidth="3"/>
              <ellipse cx="30" cy="30" rx="10" ry="12" fill="#E8C84A" opacity="0.7"/>
            </svg>
            <p style={{ fontFamily:"'Dancing Script',cursive", color:"#5C3317", fontSize:22, fontStyle:"italic" }}>loading your hive...</p>
          </div>
        </div>
      );

      if (!user) return <LoginScreen onLogin={() => {}} />;
      if (!ready) return (
        <div style={{ minHeight:"100vh", background:"#FDF5DC", display:"flex", alignItems:"center", justifyContent:"center" }}>
          <p style={{ fontFamily:"'Dancing Script',cursive", color:"#5C3317", fontSize:22, fontStyle:"italic" }}>loading your hive...</p>
        </div>
      );

      return <HoneyDo userId={user.uid} onSignOut={() => auth.signOut()} />;
    }

function hexPts(cx, cy, r) {
  return Array.from({ length: 6 }, (_, i) => {
    const a = (Math.PI / 3) * i - Math.PI / 6;
    return `${(cx + r * Math.cos(a)).toFixed(2)},${(cy + r * Math.sin(a)).toFixed(2)}`;
  }).join(" ");
}

function cellCenter(col, row) {
  return {
    x: col * CS + (row % 2 === 1 ? OFF : 0) + HW / 2 + 18,
    y: row * RS + S + 18,
  };
}

// Find nearest grid cell to a pixel point, skipping occupied cells (except self)
function nearestCell(px, py, posMap, selfId, cols = 9, rows = 14) {
  let best = { col: 0, row: 0 }, bestD = Infinity;
  for (let row = 0; row < rows; row++) {
    for (let col = 0; col < cols; col++) {
      const { x, y } = cellCenter(col, row);
      const d = Math.hypot(px - x, py - y);
      const key = `${col},${row}`;
      const blocked = posMap[key] && posMap[key] !== selfId;
      if (!blocked && d < bestD) { bestD = d; best = { col, row }; }
    }
  }
  return best;
}

function uid() { return Math.random().toString(36).slice(2, 9); }

// ─── Hex Task Cell ────────────────────────────────────────────────────────────
function HexTask({ task, cx, cy, size, dragging }) {
  const [hov, setHov] = useState(false);
  const done = task.completed;

  return (
    <g
      onMouseEnter={() => setHov(true)}
      onMouseLeave={() => setHov(false)}
      style={{
        transformOrigin: `${cx}px ${cy}px`,
        transform: hov && !dragging ? "scale(1.06)" : "scale(1)",
        transition: dragging ? "none" : "transform 0.15s ease",
        filter: dragging
          ? "drop-shadow(0 10px 20px rgba(160,120,0,0.25))"
          : hov
          ? "drop-shadow(0 5px 12px rgba(160,120,0,0.18))"
          : "drop-shadow(0 2px 6px rgba(0,0,0,0.07))",
        cursor: dragging ? "grabbing" : "pointer",
        opacity: dragging ? 0.92 : 1,
      }}
    >
      {/* Hex fill — uses task.color if set */}
      {(() => {
        const col = getHexColor(task.color);
        return (
          <polygon
            points={hexPts(cx, cy, size - 2)}
            fill={col.hex}
            fillOpacity={done ? 0.32 : 1}
            stroke={col.stroke}
            strokeWidth="1.8"
            style={{ transition: "fill-opacity 0.5s ease" }}
          />
        );
      })()}

      {/* Task title — truly centred, bigger font */}
      <foreignObject
        x={cx - (size - 10)} y={cy - size * 0.4}
        width={(size - 10) * 2} height={size * 0.8}
      >
        <div xmlns="http://www.w3.org/1999/xhtml" style={{
          height: "100%",
          display: "flex", alignItems: "center", justifyContent: "center",
          fontFamily: "'Playfair Display',serif",
          fontSize: 13.5, fontWeight: 600,
          color: BROWN,
          textAlign: "center", lineHeight: 1.3,
          textDecoration: done ? "line-through" : "none",
          opacity: done ? 0.4 : 1,
          wordBreak: "break-word",
          overflow: "hidden",
          transition: "opacity 0.5s ease",
        }}>{task.title}</div>
      </foreignObject>

      {/* Due date */}
      {task.dueDate && !done && (
        <text x={cx} y={cy + size * 0.58}
          textAnchor="middle" fontSize="8.5"
          fill={BROWN_MID} fontFamily="'Jost',sans-serif" opacity="0.5">
          {task.dueDate}
        </text>
      )}
      {/* Note indicator dot */}
      {task.note && !done && (
        <circle cx={cx + size * 0.55} cy={cy - size * 0.55} r="4"
          fill={getHexColor(task.color).stroke} opacity="0.7"/>
      )}
    </g>
  );
}

// ─── Task Popup Menu ─────────────────────────────────────────────────────────

// ─── Bearometer ──────────────────────────────────────────────────────────────
function Bearometer({ total, completed }) {
  const pct = total === 0 ? 0 : Math.round((completed / total) * 100);
  const BEAR_W = 52;
  const barRef = React.useRef(null);
  const [barW, setBarW] = React.useState(400);
  const [jarEaten, setJarEaten] = React.useState(false);
  const prevPct = React.useRef(pct);

  React.useEffect(() => {
    const measure = () => { if (barRef.current) setBarW(barRef.current.offsetWidth); };
    measure();
    window.addEventListener("resize", measure);
    return () => window.removeEventListener("resize", measure);
  }, []);

  // Trigger jar eating animation when we hit 100%
  React.useEffect(() => {
    if (pct === 100 && prevPct.current < 100) {
      setJarEaten(false);
      setTimeout(() => setJarEaten(true), 800); // wait for bear to fully arrive
    }
    if (pct < 100) setJarEaten(false);
    prevPct.current = pct;
  }, [pct]);

  const JAR_W = 50;
  const minX = BEAR_W / 2;
  const maxX = jarEaten ? barW - BEAR_W / 2 : barW - BEAR_W / 2 - JAR_W;
  const bearCx = pct === 0 ? minX : minX + (pct / 100) * (maxX - minX);
  const bearTransition = jarEaten ? "left 0.5s ease-out" : "left 0.6s ease-out";

  return (
    <div style={{
      background: WHITE, borderRadius: 22, padding: "14px 20px 16px",
      boxShadow: "0 2px 16px rgba(200,160,0,0.10)", marginBottom: 22,
      border: "1.5px solid #F0E070"
    }}>
      <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 9 }}>
        <span style={{ fontFamily: "'Dancing Script',cursive", fontSize: 15, fontWeight: 700, color: BROWN, letterSpacing: "0.02em" }}>
          Bear-ometer
        </span>
        <span style={{ fontFamily: "'Jost',sans-serif", fontSize: 12, color: BROWN_LIGHT }}>
          {completed}/{total}&nbsp;·&nbsp;<b style={{ color: GOLD_DEEP }}>{pct}%</b>
        </span>
      </div>
      {/* overflow:visible so bear head can poke above bar */}
      <div ref={barRef} style={{
        position: "relative", height: 52,
        background: "#FFFDE8",
        borderRadius: 26, border: "1.5px solid #E8D84A",
        overflow: "visible",
      }}>
        {/* Fill — clipped inside its own wrapper */}
        <div style={{
          position: "absolute", left: 0, top: 0, width: "100%", height: "100%",
          borderRadius: 26, overflow: "hidden", pointerEvents: "none",
        }}>
          <div style={{
            position: "absolute", left: 0, top: 0, height: "100%",
            width: `${pct}%`,
            background: `linear-gradient(90deg, #FFFFC5, #FFE060)`,
            borderRadius: 26,
            transition: "width 0.6s ease-out",
          }} />
        </div>

        {/* Bear head — fixed size, never shrinks */}
        <div style={{
          position: "absolute", top: "50%",
          left: bearCx,
          transform: "translate(-50%, -50%)",
          transition: bearTransition,
          lineHeight: 0, zIndex: 3,
          width: 44, height: 44, flexShrink: 0,
        }}>
          <img src={BEAR_HEAD_IMG}
            style={{ display:"block", width: 44, height: 44, objectFit:"contain", minWidth: 44 }}
            alt="bear"/>
        </div>

        {/* Honey pot — disappears when bear reaches it */}
        <div style={{
          position: "absolute", right: 6, top: "50%",
          transform: jarEaten ? "translateY(-50%) scale(0)" : "translateY(-50%) scale(1)",
          transformOrigin: "center center",
          opacity: jarEaten ? 0 : 1,
          lineHeight: 0, zIndex: 2,
          transition: "transform 0.4s cubic-bezier(0.4,0,0.2,1), opacity 0.4s ease",
        }}>
          <svg width="38" height="46" viewBox="0 0 90 110">
            <defs>
              <radialGradient id="jarGlow" cx="38%" cy="30%" r="65%">
                <stop offset="0%"   stopColor="#FFFDE0"/>
                <stop offset="60%"  stopColor="#FFFFC5"/>
                <stop offset="100%" stopColor="#FFE878"/>
              </radialGradient>
              <radialGradient id="lidBrown" cx="38%" cy="30%" r="65%">
                <stop offset="0%"   stopColor="#D4A878"/>
                <stop offset="100%" stopColor="#8B5E3C"/>
              </radialGradient>
            </defs>
            {/* Jar body */}
            <path d="M22,38 Q14,45 14,62 Q14,88 45,90 Q76,88 76,62 Q76,45 68,38 Z"
              fill="url(#jarGlow)" stroke="#C4956A" strokeWidth="2"/>
            {/* Shine */}
            <ellipse cx="32" cy="52" rx="7" ry="11" fill="white" opacity="0.28" transform="rotate(-15 32 52)"/>
            {/* Honey fill */}
            <path d="M18,72 Q18,88 45,90 Q72,88 72,72 Z" fill="#FFE060" opacity="0.4"/>
            {/* Honey drip */}
            <path d="M38,36 Q39,46 37,54 Q36,58 38,60" fill="none" stroke="#E8C84A" strokeWidth="4.5" strokeLinecap="round" opacity="0.8"/>
            <ellipse cx="38" cy="61" rx="3.5" ry="4" fill="#E8C84A" opacity="0.85"/>
            {/* Neck */}
            <path d="M24,38 Q45,32 66,38" fill="none" stroke="#C4956A" strokeWidth="2.5" strokeLinecap="round"/>
            {/* Lid — brown */}
            <ellipse cx="45" cy="33" rx="22" ry="7" fill="url(#lidBrown)" stroke="#5C3317" strokeWidth="1.8"/>
            <ellipse cx="38" cy="31" rx="10" ry="3" fill="white" opacity="0.15"/>
            {/* Knob — brown */}
            <ellipse cx="45" cy="26" rx="7" ry="5"  fill="#8B5E3C" stroke="#5C3317" strokeWidth="1.6"/>
            <ellipse cx="43" cy="24" rx="3" ry="2" fill="white" opacity="0.25"/>
          </svg>
        </div>
      </div>
      {pct === 100 && (
        <p style={{ textAlign: "center", margin: "9px 0 0",
          fontFamily: "'Dancing Script',cursive", fontStyle: "italic",
          fontSize: 14, fontWeight: 700, color: BROWN_MID }}>
          {jarEaten ? "Yummy! All tasks done — the honey is gone ✦" : total === 0 ? "Add some tasks to get started!" : "Almost there..."}
        </p>
      )}
    </div>
  );
}

// ─── Add Task Modal ───────────────────────────────────────────────────────────

    width: "100%", padding: "11px 14px", borderRadius: 14, boxSizing: "border-box",
    border: "2px solid #F0E070", background: PARCHMENT,

      }}>

            border: "none", borderRadius: 14, padding: 13, cursor: "pointer",
            fontFamily: "'Jost',sans-serif", fontWeight: 700, fontSize: 15

        </div>
      </div>
    </div>
  );
}

// ─── Pomodoro ─────────────────────────────────────────────────────────────────
function Pomodoro({ onClose }) {
  const [workMins,  setWorkMins]  = useState(25);
  const [breakMins, setBreakMins] = useState(5);
  const [isBreak,   setIsBreak]   = useState(false);
  const [secs,      setSecs]      = useState(25 * 60);
  const [run,       setRun]       = useState(false);
  const [done,      setDone]      = useState(false);
  const [editing,   setEditing]   = useState(false);
  const ref = useRef();

  const totalSecs = (isBreak ? breakMins : workMins) * 60;

  // When work/break mins change while not running, reset timer
  useEffect(() => {
    if (!run) setSecs((isBreak ? breakMins : workMins) * 60);
  }, [workMins, breakMins, isBreak]);

  useEffect(() => {
    if (run) ref.current = setInterval(() => setSecs(s => {
      if (s <= 1) {
        clearInterval(ref.current);
        setRun(false);
        setDone(true);
        return 0;
      }
      return s - 1;
    }), 1000);
    else clearInterval(ref.current);
    return () => clearInterval(ref.current);
  }, [run]);

  const pct = ((totalSecs - secs) / totalSecs) * 100;
  const mm = String(Math.floor(secs/60)).padStart(2,"0");
  const ss = String(secs%60).padStart(2,"0");

  const reset = () => {
    setSecs((isBreak ? breakMins : workMins) * 60);
    setRun(false); setDone(false);
  };

  const switchMode = (toBreak) => {
    setIsBreak(toBreak);
    setSecs((toBreak ? breakMins : workMins) * 60);
    setRun(false); setDone(false);
  };

  const jarFill   = isBreak ? "#B8E4FF" : "#FFD84B";
  const jarRipple = isBreak ? "#D0EEFF" : "#FFE878";
  const jarDrip   = isBreak ? "#90CCF0" : "#E8C84A";
  const accentCol = isBreak ? "#7AAFD8" : GOLD;

  const StepBtn = ({ onClick, children }) => (
    <button onClick={onClick} style={{
      background:"none", border:`1.5px solid #E8E0C8`, borderRadius:7,
      width:26, height:26, cursor:"pointer", fontWeight:900,
      color:BROWN_MID, fontSize:14, display:"flex", alignItems:"center",
      justifyContent:"center", flexShrink:0, transition:"all 0.15s",
    }}
      onMouseEnter={e=>e.currentTarget.style.background=PARCHMENT}
      onMouseLeave={e=>e.currentTarget.style.background="none"}
    >{children}</button>
  );

  return (
    <div style={{
      position:"fixed",inset:0,background:"rgba(50,30,5,0.35)",zIndex:1000,
      display:"flex",alignItems:"center",justifyContent:"center",backdropFilter:"blur(6px)"
    }}>
      <div style={{
        background:WHITE,borderRadius:28,padding:"28px 32px 24px",width:310,
        boxShadow:"0 28px 70px rgba(0,0,0,0.2)",textAlign:"center",
        border:"2px solid #F0E070"
      }}>
        <h3 style={{margin:"0 0 14px",color:BROWN,fontFamily:"'Dancing Script',cursive",fontSize:22}}>Honey Focus</h3>

        {/* Mode tabs */}
        <div style={{display:"flex",gap:6,justifyContent:"center",marginBottom:16}}>
          {[{label:"Work",isB:false},{label:"Break",isB:true}].map(({label,isB})=>(
            <button key={label} onClick={()=>switchMode(isB)} style={{
              padding:"5px 18px", borderRadius:20, border:"none", cursor:"pointer",
              fontFamily:"'Jost',sans-serif", fontWeight:700, fontSize:12,
              background: isBreak===isB ? (isB?"#C8E8FF":HEX_COLOR) : PARCHMENT,
              color: isBreak===isB ? (isB?"#3A7AAF":BROWN) : BROWN_LIGHT,
              border: `1.5px solid ${isBreak===isB ? (isB?"#7AAFD8":GOLD) : "transparent"}`,
              transition:"all 0.2s",
            }}>{label}</button>
          ))}
        </div>

        {/* Jar */}
        <svg width="110" height="138" viewBox="0 0 90 110" style={{margin:"0 auto 14px",display:"block"}}>
          <defs>
            <radialGradient id="pomJarGlow" cx="38%" cy="30%" r="65%">
              <stop offset="0%"   stopColor="#FFFDE0"/>
              <stop offset="60%"  stopColor="#FFFFC5"/>
              <stop offset="100%" stopColor="#FFE878"/>
            </radialGradient>
            <radialGradient id="pomLidBrown" cx="38%" cy="30%" r="65%">
              <stop offset="0%"   stopColor="#D4A878"/>
              <stop offset="100%" stopColor="#8B5E3C"/>
            </radialGradient>
            <clipPath id="jarClip">
              <path d="M22,38 Q14,45 14,62 Q14,88 45,90 Q76,88 76,62 Q76,45 68,38 Z"/>
            </clipPath>
          </defs>
          <path d="M22,38 Q14,45 14,62 Q14,88 45,90 Q76,88 76,62 Q76,45 68,38 Z"
            fill="url(#pomJarGlow)" stroke="#C4956A" strokeWidth="2"/>
          <rect x="14" y={38 + 50*(1 - pct/100)} width="62" height={50*(pct/100) + 2}
            fill={jarFill} opacity="0.75" clipPath="url(#jarClip)"
            style={{transition:"all 1s ease"}}/>
          {pct > 2 && <ellipse cx="45" cy={38 + 50*(1 - pct/100)} rx="28" ry="4"
            fill={jarRipple} opacity="0.6" clipPath="url(#jarClip)"
            style={{transition:"all 1s ease"}}/>}
          <ellipse cx="30" cy="56" rx="7" ry="12" fill="white" opacity="0.22" transform="rotate(-15 30 56)"/>
          {pct > 4 && <path d="M38,36 Q39,46 37,54 Q36,58 38,60" fill="none" stroke={jarDrip} strokeWidth="4" strokeLinecap="round" opacity="0.8"/>}
          {pct > 4 && <ellipse cx="38" cy="61" rx="3" ry="3.5" fill={jarDrip} opacity="0.85"/>}
          <path d="M24,38 Q45,32 66,38" fill="none" stroke="#C4956A" strokeWidth="2.5" strokeLinecap="round"/>
          <ellipse cx="45" cy="33" rx="22" ry="7" fill="url(#pomLidBrown)" stroke="#5C3317" strokeWidth="1.8"/>
          <ellipse cx="38" cy="31" rx="10" ry="3" fill="white" opacity="0.15"/>
          <ellipse cx="45" cy="26" rx="7" ry="5" fill="#8B5E3C" stroke="#5C3317" strokeWidth="1.6"/>
          <ellipse cx="43" cy="24" rx="3" ry="2" fill="white" opacity="0.25"/>
        </svg>

        {/* Timer display */}
        <div style={{fontSize:52,fontWeight:900,color:BROWN,fontFamily:"monospace",letterSpacing:3,marginBottom:4}}>{mm}:{ss}</div>
        <div style={{fontSize:11,color:BROWN_LIGHT,fontFamily:"'Jost',sans-serif",marginBottom:14,fontWeight:600,letterSpacing:"0.05em",textTransform:"uppercase"}}>
          {isBreak ? "break time" : "focus time"}
        </div>

        {done && <p style={{color:SAGE,fontWeight:800,fontSize:14,marginBottom:12,fontFamily:"'Jost',sans-serif"}}>
          {isBreak ? "Break over — back to it! ✦" : "Sweet session complete ✦"}
        </p>}

        {/* Controls */}
        <div style={{display:"flex",gap:10,justifyContent:"center",marginBottom:16}}>
          <button onClick={()=>setRun(r=>!r)} style={{
            background:run?"#E07B4F":`linear-gradient(135deg,#FFE878,${GOLD})`,
            color:run?"white":BROWN,border:"none",borderRadius:14,padding:"10px 22px",
            cursor:"pointer",fontFamily:"'Jost',sans-serif",fontWeight:800,fontSize:14,
            transition:"all 0.2s",
          }}>{run?"⏸ Pause":"▶ Start"}</button>
          <button onClick={reset} style={{
            background:PARCHMENT,color:BROWN_MID,border:"none",borderRadius:14,
            padding:"10px 22px",cursor:"pointer",fontFamily:"'Jost',sans-serif",fontWeight:700,fontSize:14
          }}>↺ Reset</button>
        </div>

        {/* Time adjusters */}
        <div style={{
          background:PARCHMENT,borderRadius:16,padding:"12px 16px",
          display:"flex",gap:16,justifyContent:"center",alignItems:"center",
        }}>
          {/* Work */}
          <div style={{textAlign:"center"}}>
            <div style={{fontSize:10,fontWeight:700,color:BROWN_LIGHT,fontFamily:"'Jost',sans-serif",textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:5}}>Work</div>
            <div style={{display:"flex",alignItems:"center",gap:5}}>
              <StepBtn onClick={()=>{ if(!run && workMins>1) setWorkMins(m=>m-1); }}>−</StepBtn>
              <input
                type="number" min="1" max="90" value={workMins} disabled={run}
                onChange={e => { const v = Math.min(90, Math.max(1, parseInt(e.target.value)||1)); setWorkMins(v); }}
                style={{
                  width:38, textAlign:"center", border:`1.5px solid ${run?"#E8E0C8":GOLD}`,
                  borderRadius:8, padding:"2px 4px", fontFamily:"'Jost',sans-serif",
                  fontWeight:800, fontSize:15, color:BROWN, background: run?"#F5F0E8":WHITE,
                  outline:"none", MozAppearance:"textfield",
                }}
              />
              <StepBtn onClick={()=>{ if(!run && workMins<90) setWorkMins(m=>m+1); }}>+</StepBtn>
            </div>
          </div>

          <div style={{width:1,height:36,background:"#E8E0C8"}}/>

          {/* Break */}
          <div style={{textAlign:"center"}}>
            <div style={{fontSize:10,fontWeight:700,color:BROWN_LIGHT,fontFamily:"'Jost',sans-serif",textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:5}}>Break</div>
            <div style={{display:"flex",alignItems:"center",gap:5}}>
              <StepBtn onClick={()=>{ if(!run && breakMins>1) setBreakMins(m=>m-1); }}>−</StepBtn>
              <input
                type="number" min="1" max="60" value={breakMins} disabled={run}
                onChange={e => { const v = Math.min(60, Math.max(1, parseInt(e.target.value)||1)); setBreakMins(v); }}
                style={{
                  width:38, textAlign:"center", border:`1.5px solid ${run?"#E8E0C8":GOLD}`,
                  borderRadius:8, padding:"2px 4px", fontFamily:"'Jost',sans-serif",
                  fontWeight:800, fontSize:15, color:BROWN, background: run?"#F5F0E8":WHITE,
                  outline:"none", MozAppearance:"textfield",
                }}
              />
              <StepBtn onClick={()=>{ if(!run && breakMins<60) setBreakMins(m=>m+1); }}>+</StepBtn>
            </div>
          </div>
        </div>

        <button onClick={onClose} style={{marginTop:14,background:"none",border:"none",color:BROWN_LIGHT,cursor:"pointer",fontFamily:"'Jost',sans-serif",fontSize:13}}>Close</button>
      </div>
    </div>
  );
}

// ─── List Row ─────────────────────────────────────────────────────────────────
function ListRow({ task, onToggle, onDelete, onUpdate, onHandlePointerDown, isDragging, rowRef }) {
  const done = task.completed;
  const [expanded, setExpanded] = useState(false);
  const hasTime = task.scheduledTime || task.scheduledDuration;
  const to12 = t => { if(!t) return ""; const [h,m] = t.split(":"); const hr=parseInt(h); return `${hr%12||12}:${m} ${hr>=12?"PM":"AM"}`; };
  return (
    <div
      ref={rowRef}
      style={{
        background: isDragging ? PARCHMENT : WHITE,
        borderRadius:16,
        marginBottom: 8,
        border:`1.5px solid ${isDragging ? GOLD : done ? "#E0C8A8" : "#F0E070"}`,
        boxShadow: isDragging ? `0 8px 28px rgba(200,160,0,0.25)` : "0 1px 6px rgba(0,0,0,0.04)",
        opacity: isDragging ? 0.4 : done ? 0.72 : 1,
        transition:"all 0.12s",
        transform: isDragging ? "scale(1.025) rotate(-0.5deg)" : "scale(1)",
        overflow: "hidden",
      }}
    >
      {/* Main row */}
      <div style={{ display:"flex", alignItems:"center", gap:12, padding:"12px 16px" }}>
        <div onPointerDown={onHandlePointerDown} style={{ color: "#D4C090", fontSize: 13, cursor: "grab", flexShrink: 0, userSelect: "none", letterSpacing: 1, touchAction: "none" }}>⠿</div>
        <div onClick={() => onToggle(task.id)} style={{
          width:28, height:28, borderRadius:"50%", cursor:"pointer",
          background: done ? "#C4956A" : HEX_COLOR,
          border:`2px solid ${done ? BROWN_LIGHT : GOLD}`,
          display:"flex", alignItems:"center", justifyContent:"center",
          fontSize:15, flexShrink:0, transition:"all 0.3s",
          color: done ? "white" : GOLD
        }}>✿</div>
        <div onClick={() => setExpanded(e => !e)} style={{ flex:1, minWidth:0, cursor:"pointer" }}>
          <div style={{ fontFamily:"'Jost',sans-serif", fontSize:14, fontWeight:600, color:done?BROWN_LIGHT:BROWN, textDecoration:done?"line-through":"none" }}>{task.title}</div>
          {hasTime && !expanded && (
            <div style={{ display:"flex", gap:5, marginTop:3 }}>
              {task.scheduledTime && <span style={{ fontSize:10, background:PARCHMENT, color:BROWN_MID, borderRadius:6, padding:"2px 7px", fontWeight:600, border:`1px solid ${GOLD}`, fontFamily:"'Jost',sans-serif" }}>{to12(task.scheduledTime)}</span>}
              {task.scheduledDuration && <span style={{ fontSize:10, background:PARCHMENT, color:BROWN_MID, borderRadius:6, padding:"2px 7px", fontWeight:600, border:`1px solid ${GOLD}`, fontFamily:"'Jost',sans-serif" }}>{task.scheduledDuration}</span>}
            </div>
          )}
        </div>
        {task.dueDate && <span style={{fontSize:11,color:BROWN_LIGHT,fontFamily:"'Jost',sans-serif",flexShrink:0}}>{task.dueDate}</span>}
        <button onClick={() => onDelete(task.id)} style={{background:"none",border:"none",cursor:"pointer",fontSize:14,opacity:0.25,transition:"opacity 0.2s",flexShrink:0}} onMouseEnter={e=>e.target.style.opacity=1} onMouseLeave={e=>e.target.style.opacity=0.25}>✕</button>
      </div>
      {/* Expandable time row */}
      {expanded && (
        <div style={{ display:"flex", gap:8, padding:"0 12px 12px 12px", alignItems:"center" }}>
          {(() => {
            return (
              <label style={{ position:"relative", display:"inline-block" }}>
                <span style={{ fontSize:11, color:BROWN_MID, fontFamily:"'Jost',sans-serif", background:PARCHMENT, border:`1px solid ${GOLD}`, borderRadius:8, padding:"4px 8px", display:"inline-flex", alignItems:"center", gap:6, minWidth:80, cursor:"pointer" }}>
                  {task.scheduledTime ? to12(task.scheduledTime) : <span style={{opacity:0.4}}>Start time</span>}
                  <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke={BROWN_LIGHT} strokeWidth="2.5"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                </span>
                <input
                  type="time"
                  value={task.scheduledTime || ""}
                  onChange={e => onUpdate(task.id, { scheduledTime: e.target.value })}
                  style={{ position:"absolute", inset:0, opacity:0, width:"100%", height:"100%", cursor:"pointer" }}
                />
              </label>
            );
          })()}
          <input
            type="text"
            value={task.scheduledDuration || ""}
            onChange={e => onUpdate(task.id, { scheduledDuration: e.target.value })}
            placeholder="e.g. 30 min"
            style={{ fontSize:11, color:BROWN_MID, fontFamily:"'Jost',sans-serif", background:PARCHMENT, border:`1px solid ${GOLD}`, borderRadius:8, padding:"4px 8px", outline:"none", width: Math.max(90, ((task.scheduledDuration||"").length + 1) * 8) }}
          />
          {(task.scheduledTime || task.scheduledDuration) && (
            <button onClick={() => onUpdate(task.id, { scheduledTime:"", scheduledDuration:"" })} style={{ background:"none", border:"none", cursor:"pointer", color:BROWN_LIGHT, fontSize:13, opacity:0.5, padding:"0 2px" }}>✕</button>
          )}
        </div>
      )}
    </div>
  );
}
