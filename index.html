// ─── TodayTab ────────────────────────────────────────────────────────────────
function TodayTab({ tasks, hives, weeklyGoals, setWeeklyGoals, intentions, onToggle, onDelete, onAdd, onUpdate, activeHive, setPollen, onShowTimeChange, isMobile }) {
  const today = new Date().toDateString();
  const todayIntention = intentions.find(i => i.date === today);
  const [newGoal, setNewGoal] = useState("");
  const [newGoalPollen, setNewGoalPollen] = useState(20);
  const [showGoalInput, setShowGoalInput] = useState(false);
  const [showAdd, setShowAdd] = useState(false);
  const [newTaskTitle, setNewTaskTitle] = useState("");
  const [selectedHive, setSelectedHive] = useState(activeHive || (hives[0] && hives[0].id) || "");
  const [showSettings, setShowSettings] = useState(false);
  const [showCompleted, setShowCompleted] = useState(() => { try { return JSON.parse(localStorage.getItem("hd4-listShowCompleted") ?? "false"); } catch { return false; } });
  const [sendToBottom, setSendToBottom] = useState(() => { try { return JSON.parse(localStorage.getItem("hd4-sendToBottom") ?? "false"); } catch { return false; } });
  const [showTime, setShowTime] = useState(() => { try { return JSON.parse(localStorage.getItem("hd4-listShowTime") ?? "false"); } catch { return false; } });
  const [taskOrder, setTaskOrder] = useState(() => { try { return JSON.parse(localStorage.getItem("hd4-listOrder")) || []; } catch { return []; } });
  const [dragOverIdx, setDragOverIdx] = useState(null);
  const [isDraggingId, setIsDraggingId] = useState(null);
  const dragState = useRef({ id: null });
  const rowRefs = useRef({});

  const saveSettings = (sc, st, sb) => {
    try { localStorage.setItem("hd4-listShowCompleted", JSON.stringify(sc)); } catch {}
    try { localStorage.setItem("hd4-listShowTime", JSON.stringify(st)); } catch {}
    try { localStorage.setItem("hd4-sendToBottom", JSON.stringify(sb !== undefined ? sb : sendToBottom)); } catch {}
  };

  const saveOrder = (order) => {
    setTaskOrder(order);
    try { localStorage.setItem("hd4-listOrder", JSON.stringify(order)); } catch {}
  };

  // Ensure all tasks have a position in the order
  const fullOrder = (() => {
    const known = new Set(taskOrder);
    const extras = tasks.filter(t => !known.has(t.id)).map(t => t.id);
    return [...taskOrder, ...extras];
  })();

  const sortedTasks = [...tasks].sort((a, b) => {
    if (sendToBottom && a.completed !== b.completed) return a.completed ? 1 : -1;
    const ai = fullOrder.indexOf(a.id);
    const bi = fullOrder.indexOf(b.id);
    return ai - bi;
  });

  const sortedTasksRef = useRef(sortedTasks);
  useEffect(() => { sortedTasksRef.current = sortedTasks; }, [sortedTasks]);

  const makeHandlePointerDown = (id) => (e) => {
    e.preventDefault();
    e.currentTarget.setPointerCapture(e.pointerId);
    dragState.current = { id };
    setIsDraggingId(id);

    let lastIdx = null;
    let rafId = null;

    const onMove = (ev) => {
      if (rafId) return; // skip if already queued
      rafId = requestAnimationFrame(() => {
        rafId = null;
        const clientY = ev.clientY;
        const all = sortedTasksRef.current;
        let found = all.length;
        for (let i = 0; i < all.length; i++) {
          const el = rowRefs.current[all[i].id];
          if (!el) continue;
          const rect = el.getBoundingClientRect();
          if (clientY < rect.top + rect.height / 2) { found = i; break; }
        }
        if (found !== lastIdx) {
          lastIdx = found;
          setDragOverIdx(found);
        }
      });
    };

    const onUp = () => {
      if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
      const draggedId = dragState.current.id;
      const all = sortedTasksRef.current;
      const ids = all.map(t => t.id);
      const fromIdx = ids.indexOf(draggedId);
      const toIdx = lastIdx !== null ? (lastIdx > fromIdx ? lastIdx - 1 : lastIdx) : fromIdx;
      if (fromIdx !== -1 && toIdx !== fromIdx) {
        const newOrder = [...ids];
        newOrder.splice(fromIdx, 1);
        newOrder.splice(toIdx, 0, draggedId);
        saveOrder(newOrder);
      }
      dragState.current = { id: null };
      setIsDraggingId(null);
      setDragOverIdx(null);
      window.removeEventListener("pointermove", onMove);
      window.removeEventListener("pointerup", onUp);
    };

    window.addEventListener("pointermove", onMove);
    window.addEventListener("pointerup", onUp);
  };

  const handleUpdate = (taskId, fields) => {
    onUpdate(taskId, fields);
  };

  const addGoal = () => {
    if (!newGoal.trim()) return;
    setWeeklyGoals(prev => [...prev, { id: Date.now().toString(), text: newGoal.trim(), done: false, week: getWeekKey(), pollen: newGoalPollen }]);
    setNewGoal(""); setNewGoalPollen(20); setShowGoalInput(false);
  };
  const toggleGoal = id => {
    setWeeklyGoals(prev => prev.map(g => {
      if (g.id !== id) return g;
      if (!g.done) setPollen(p => p + (g.pollen || 0));
      else setPollen(p => Math.max(0, p - (g.pollen || 0)));
      return { ...g, done: !g.done };
    }));
  };
  const deleteGoal = id => setWeeklyGoals(prev => prev.filter(g => g.id !== id));
  const weekGoals = weeklyGoals.filter(g => g.week === getWeekKey());
  const doneGoals = weekGoals.filter(g => g.done).length;

  const addTask = () => {
    if (!newTaskTitle.trim()) return;
    onAdd({ title: newTaskTitle.trim(), hiveId: selectedHive, priority: "medium", dueDate: "" });
    setNewTaskTitle(""); setShowAdd(false);
  };

  return (
    <div style={{ flex: 1, minWidth: 0 }}>
      <div>
        {/* Settings gear */}
        <div style={{ display: "flex", justifyContent: "flex-end", marginBottom: 8, position: "relative" }}>
          <button onClick={() => setShowSettings(s => !s)} style={{ background: "none", border: "none", cursor: "pointer", padding: 4, opacity: 0.5, transition: "opacity 0.2s" }} onMouseEnter={e => e.currentTarget.style.opacity=1} onMouseLeave={e => e.currentTarget.style.opacity=0.5}>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke={BROWN} strokeWidth="2" strokeLinecap="round">
              <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/>
            </svg>
          </button>
          {showSettings && (
            <div style={{ position: "absolute", top: 28, right: 0, background: WHITE, border: `1.5px solid ${GOLD}`, borderRadius: 14, padding: "12px 16px", zIndex: 100, boxShadow: "0 4px 20px rgba(0,0,0,0.1)", minWidth: 200 }}>
              <div style={{ fontSize: 11, fontWeight: 700, color: BROWN_LIGHT, textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: 10, fontFamily: "'Jost',sans-serif" }}>List settings</div>
              <label style={{ display: "flex", alignItems: "center", gap: 10, cursor: "pointer", marginBottom: 10 }}>
                <input type="checkbox" checked={showCompleted} onChange={e => { setShowCompleted(e.target.checked); saveSettings(e.target.checked, showTime); }} style={{ accentColor: GOLD, width: 15, height: 15 }} />
                <span style={{ fontSize: 13, color: BROWN, fontFamily: "'Jost',sans-serif" }}>Show completed section</span>
              </label>
              <label style={{ display: "flex", alignItems: "center", gap: 10, cursor: "pointer", marginBottom: 10 }}>
                <input type="checkbox" checked={showTime} onChange={e => { setShowTime(e.target.checked); saveSettings(showCompleted, e.target.checked); if(onShowTimeChange) onShowTimeChange(e.target.checked); }} style={{ accentColor: GOLD, width: 15, height: 15 }} />
                <span style={{ fontSize: 13, color: BROWN, fontFamily: "'Jost',sans-serif" }}>Show time in popup</span>
              </label>
              <label style={{ display: "flex", alignItems: "center", gap: 10, cursor: "pointer" }}>
                <input type="checkbox" checked={sendToBottom} onChange={e => { setSendToBottom(e.target.checked); saveSettings(showCompleted, showTime, e.target.checked); }} style={{ accentColor: GOLD, width: 15, height: 15 }} />
                <span style={{ fontSize: 13, color: BROWN, fontFamily: "'Jost',sans-serif" }}>Send completed to bottom</span>
              </label>
            </div>
          )}
        </div>

        {todayIntention && (
          <div style={{ background: "linear-gradient(135deg, #FFFFF0, #FFFCD4)", border: "1.5px solid #F0E070", borderRadius: 14, padding: "12px 16px", marginBottom: 16 }}>
            <div style={{ fontSize: 10, fontWeight: 700, color: BROWN_LIGHT, textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: 4, fontFamily: "'Jost',sans-serif" }}>today's intention</div>
            <div style={{ fontSize: 13, color: BROWN, fontStyle: "italic", fontFamily: "'Jost',sans-serif" }}>❝ {todayIntention.text} ❞</div>
          </div>
        )}

        {/* Add task inline */}
        {showAdd ? (
          <div style={{ background: WHITE, border: `1.5px solid ${GOLD}`, borderRadius: 16, padding: "14px 16px", marginBottom: 10 }}>
            <input autoFocus value={newTaskTitle} onChange={e => setNewTaskTitle(e.target.value)}
              onKeyDown={e => { if(e.key==="Enter") addTask(); if(e.key==="Escape") setShowAdd(false); }}
              placeholder="Task name..."
              style={{ width: "100%", border: "none", outline: "none", fontFamily: "'Jost',sans-serif", fontSize: 14, fontWeight: 600, color: BROWN, background: "transparent", marginBottom: 10, boxSizing: "border-box" }}
            />
            <div style={{ marginBottom: 8 }}>
              <div style={{ fontSize: 10, fontWeight: 700, color: BROWN_LIGHT, textTransform: "uppercase", letterSpacing: "0.07em", marginBottom: 4, fontFamily: "'Jost',sans-serif" }}>Add to hive</div>
              <select value={selectedHive} onChange={e => setSelectedHive(e.target.value)} style={{ width: "100%", padding: "7px 10px", borderRadius: 10, border: `1.5px solid ${GOLD}`, background: PARCHMENT, color: BROWN, fontFamily: "'Jost',sans-serif", fontSize: 13, fontWeight: 600, outline: "none" }}>
                {hives.map(h => <option key={h.id} value={h.id}>{h.icon ? h.icon + " " : ""}{h.name}</option>)}
              </select>
            </div>
            <div style={{ display: "flex", gap: 8 }}>
              <button onClick={addTask} style={{ flex: 1, background: `linear-gradient(135deg, #FFE878, ${GOLD})`, border: "none", borderRadius: 10, padding: "8px", cursor: "pointer", fontFamily: "'Jost',sans-serif", fontWeight: 700, fontSize: 13, color: BROWN }}>Add ✦</button>
              <button onClick={() => { setShowAdd(false); setNewTaskTitle(""); }} style={{ background: PARCHMENT, border: `1px solid ${GOLD}`, borderRadius: 10, padding: "8px 14px", cursor: "pointer", fontFamily: "'Jost',sans-serif", fontWeight: 600, fontSize: 13, color: BROWN_MID }}>Cancel</button>
            </div>
          </div>
        ) : (
          <div onClick={() => setShowAdd(true)} style={{ display: "flex", alignItems: "center", gap: 10, border: "1.5px dashed #E8C840", borderRadius: 14, padding: "10px 16px", color: BROWN_LIGHT, fontSize: 13, cursor: "pointer", marginBottom: 10, fontFamily: "'Jost',sans-serif" }}>
            <div style={{ width: 26, height: 26, borderRadius: "50%", border: "2px dashed #E8C840", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 16, color: GOLD }}>+</div>
            Add a new task...
          </div>
        )}

        {tasks.length === 0 && (
          <div style={{ textAlign: "center", padding: "50px 20px", color: BROWN_LIGHT, fontFamily: "'Jost',sans-serif", fontSize: 13 }}>
            No tasks yet! Add one above ✦
          </div>
        )}

        {/* Task list with ghost drag */}
        {(() => {
          const incomplete = sortedTasks.filter(t => !t.completed);
          const complete = sortedTasks.filter(t => t.completed);
          const allVisible = sendToBottom ? [...incomplete, ...complete] : sortedTasks;
          const draggingTask = sortedTasks.find(t => t.id === isDraggingId);

          const rows = [];
          allVisible.forEach((t, idx) => {
            // Insert ghost gap BEFORE this item if dragOverIdx === idx
            if (isDraggingId && dragOverIdx === idx && draggingTask) {
              rows.push(
                <div key="ghost" style={{
                  borderRadius: 16, marginBottom: 8, padding: "12px 16px",
                  border: `2px dashed ${GOLD}`,
                  background: `${HEX_COLOR}66`,
                  display: "flex", alignItems: "center", gap: 12,
                  transition: "all 0.12s",
                  minHeight: 56,
                }}>
                  <div style={{ color: "#D4C090", fontSize: 13, letterSpacing: 1, userSelect: "none" }}>⠿</div>
                  <div style={{ width: 28, height: 28, borderRadius: "50%", border: `2px dashed ${GOLD}`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 15, color: GOLD, flexShrink: 0 }}>✿</div>
                  <span style={{ fontFamily: "'Jost',sans-serif", fontSize: 14, fontWeight: 600, color: BROWN_LIGHT, opacity: 0.5 }}>{draggingTask.title}</span>
                </div>
              );
            }
            rows.push(
              <ListRow
                key={t.id} task={t}
                onToggle={onToggle} onDelete={onDelete} onUpdate={onUpdate}
                isDragging={isDraggingId === t.id}
                onHandlePointerDown={makeHandlePointerDown(t.id)}
                rowRef={el => rowRefs.current[t.id] = el}
              />
            );
          });
          // Ghost at the end
          if (isDraggingId && dragOverIdx === allVisible.length && draggingTask) {
            rows.push(
              <div key="ghost-end" style={{
                borderRadius: 16, marginBottom: 8, padding: "12px 16px",
                border: `2px dashed ${GOLD}`,
                background: `${HEX_COLOR}66`,
                display: "flex", alignItems: "center", gap: 12,
                minHeight: 56,
              }}>
                <div style={{ color: "#D4C090", fontSize: 13, letterSpacing: 1 }}>⠿</div>
                <div style={{ width: 28, height: 28, borderRadius: "50%", border: `2px dashed ${GOLD}`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 15, color: GOLD, flexShrink: 0 }}>✿</div>
                <span style={{ fontFamily: "'Jost',sans-serif", fontSize: 14, fontWeight: 600, color: BROWN_LIGHT, opacity: 0.5 }}>{draggingTask.title}</span>
              </div>
            );
          }

          return (
            <>
              {rows}
              {showCompleted && complete.length > 0 && !sendToBottom && (
                <div style={{ fontSize: 11, color: BROWN_LIGHT, fontWeight: 800, textTransform: "uppercase", letterSpacing: 1, margin: "16px 0 8px", fontFamily: "'Jost',sans-serif" }}>✿ Completed</div>
              )}
            </>
          );
        })()}
      </div>

      {/* Weekly goals — below tasks */}
      <div style={{ background: WHITE, border: "1.5px solid #F0E070", borderRadius: 20, padding: isMobile ? 12 : 16, boxShadow: "0 2px 16px rgba(200,160,0,0.07)", marginTop: 20 }}>
          <div style={{ fontFamily: "'Dancing Script',cursive", fontSize: 18, color: BROWN, marginBottom: 4, fontWeight: 700 }}>This week's goals</div>
          {weekGoals.length > 0 && (
            <div style={{ height: 5, background: "#F0E8CC", borderRadius: 3, marginBottom: 10 }}>
              <div style={{ height: "100%", background: GOLD, borderRadius: 3, width: `${Math.round((doneGoals/weekGoals.length)*100)}%`, transition: "width 0.4s" }} />
            </div>
          )}
          {weekGoals.length === 0 && !showGoalInput && (
            <div style={{ fontSize: 12, color: BROWN_LIGHT, fontFamily: "'Jost',sans-serif", fontStyle: "italic", padding: "4px 0 8px" }}>No goals yet this week</div>
          )}
          {weekGoals.map(g => (
            <div key={g.id} style={{ display: "flex", alignItems: "center", gap: 8, padding: "7px 0", borderBottom: "1px solid #F5EDD0" }}>
              <div onClick={() => toggleGoal(g.id)} style={{ width: 20, height: 20, borderRadius: "50%", flexShrink: 0, cursor: "pointer", border: `2px solid ${g.done ? GOLD : "#E8D084"}`, background: g.done ? GOLD : "transparent", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 12, color: "white" }}>
                {g.done && "✿"}
              </div>
              <div style={{ flex: 1, fontSize: 12, color: BROWN, fontFamily: "'Jost',sans-serif", textDecoration: g.done ? "line-through" : "none", opacity: g.done ? 0.5 : 1 }}>{g.text}</div>
              {g.pollen > 0 && <span style={{ fontSize: 10, color: BROWN_LIGHT, fontFamily: "'Jost',sans-serif", whiteSpace: "nowrap" }}>✦{g.pollen}</span>}
              <div onClick={() => deleteGoal(g.id)} style={{ cursor: "pointer", color: BROWN_LIGHT, fontSize: 11, opacity: 0.4 }}>✕</div>
            </div>
          ))}
          {showGoalInput ? (
            <div style={{ marginTop: 8 }}>
              <input autoFocus value={newGoal} onChange={e => setNewGoal(e.target.value)}
                onKeyDown={e => { if(e.key==="Enter") addGoal(); if(e.key==="Escape") setShowGoalInput(false); }}
                placeholder="A weekly goal..."
                style={{ width: "100%", padding: "7px 10px", borderRadius: 10, border: `1.5px solid ${GOLD}`, background: PARCHMENT, color: BROWN, fontFamily: "'Jost',sans-serif", fontSize: 12, outline: "none", boxSizing: "border-box", marginBottom: 6 }}
              />
              <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 6 }}>
                <span style={{ fontSize: 11, color: BROWN_LIGHT, fontFamily: "'Jost',sans-serif", whiteSpace: "nowrap" }}>✦ Pollen reward:</span>
                <input type="number" min="0" max="999" value={newGoalPollen} onChange={e => setNewGoalPollen(Number(e.target.value))}
                  style={{ width: 60, padding: "4px 8px", borderRadius: 8, border: `1.5px solid ${GOLD}`, background: PARCHMENT, color: BROWN, fontFamily: "'Jost',sans-serif", fontSize: 12, outline: "none", textAlign: "center" }}
                />
              </div>
              <div style={{ display: "flex", gap: 5 }}>
                <button onClick={addGoal} style={{ flex: 1, background: GOLD, border: "none", borderRadius: 8, padding: "5px", cursor: "pointer", fontFamily: "'Jost',sans-serif", fontWeight: 700, fontSize: 11, color: BROWN }}>Add</button>
                <button onClick={() => setShowGoalInput(false)} style={{ flex: 1, background: "#EEE", border: "none", borderRadius: 8, padding: "5px", cursor: "pointer", fontFamily: "'Jost',sans-serif", fontWeight: 700, fontSize: 11, color: BROWN_MID }}>Cancel</button>
              </div>
            </div>
          ) : (
            <button onClick={() => setShowGoalInput(true)} style={{ marginTop: 8, width: "100%", background: "transparent", border: `1.5px dashed ${GOLD}`, borderRadius: 10, padding: "7px", cursor: "pointer", fontFamily: "'Jost',sans-serif", fontWeight: 600, fontSize: 12, color: BROWN_LIGHT }}>+ Add goal</button>
          )}
      </div>
    </div>
  );
}

// ─── GardenTab ────────────────────────────────────────────────────────────────
function GardenTab({ habits, setHabits, dreams, setDreams, setPollen, triggerBear, isMobile }) {
  const [newDream, setNewDream] = useState("");
  const [showDreamInput, setShowDreamInput] = useState(false);
  const [newHabit, setNewHabit] = useState("");
  const [showHabitInput, setShowHabitInput] = useState(false);
  const today = new Date().toDateString();

  // Get last 7 days (Mon–today or rolling 7)
  const last7 = Array.from({ length: 7 }, (_, i) => {
    const d = new Date(); d.setDate(d.getDate() - (6 - i));
    return d.toDateString();
  });

  const addDream = () => {
    if (!newDream.trim()) return;
    setDreams(prev => [...prev, { id: Date.now().toString(), text: newDream.trim() }]);
    setNewDream(""); setShowDreamInput(false);
  };

  const addHabit = () => {
    if (!newHabit.trim()) return;
    setHabits(prev => [...prev, { id: Date.now().toString(), text: newHabit.trim(), log: [], weekBonusClaimed: [] }]);
    setNewHabit(""); setShowHabitInput(false);
  };

  const toggleHabitDay = (habitId, dateStr) => {
    if (dateStr !== today) return; // only today!
    setHabits(prev => prev.map(h => {
      if (h.id !== habitId) return h;
      const log = h.log || [];
      const alreadyDone = log.includes(dateStr);
      const newLog = alreadyDone ? log.filter(d => d !== dateStr) : [...log, dateStr];

      if (!alreadyDone) {
        // Award 5 pollen for checking today
        setPollen(p => p + 5);
        // Check if all 7 days done this week
        const weekDays = last7;
        const allDone = weekDays.every(d => newLog.includes(d));
        const weekKey = getWeekKey();
        const bonusClaimed = (h.weekBonusClaimed || []).includes(weekKey);
        if (allDone && !bonusClaimed) {
          setPollen(p => p + 20);
          triggerBear("Perfect week! +20 ✦🌸");
          return { ...h, log: newLog, weekBonusClaimed: [...(h.weekBonusClaimed||[]), weekKey] };
        } else {
          triggerBear(["Good habit! +5 ✦", "Keep it up! +5 ✦", "Bear approves! +5 ✦"][Math.floor(Math.random()*3)]);
      }
      } else {
        setPollen(p => Math.max(0, p - 5));
      }
      return { ...h, log: newLog };
    }));
  };

  // Flower dot — same ✿ as list view checkboxes
  const FlowerDot = ({ filled, isToday, dateStr, habitId }) => (
    <div
      onClick={() => toggleHabitDay(habitId, dateStr)}
      title={isToday ? "Click to check off today!" : new Date(dateStr).toLocaleDateString("en-US", { weekday:"short", month:"short", day:"numeric" })}
      style={{
        width: isMobile ? 26 : 30, height: isMobile ? 26 : 30, borderRadius: "50%", flexShrink: 0,
        cursor: isToday ? "pointer" : "default",
        background: filled ? "#C4956A" : isToday ? HEX_COLOR : "#F5EDD0",
        border: `2px solid ${filled ? BROWN_LIGHT : isToday ? GOLD : "#E0D090"}`,
        display: "flex", alignItems: "center", justifyContent: "center",
        fontSize: isMobile ? 13 : 16, color: filled ? "white" : isToday ? GOLD : "#D4C090",
        opacity: !isToday && !filled ? 0.4 : 1,
        transition: "all 0.2s",
        transform: filled ? "scale(1.1)" : "scale(1)",
      }}
    >✿</div>
  );

  return (
    <div style={{ maxWidth: 700 }}>
      {/* ── Habits ── */}
      <div style={{ fontFamily: "'Dancing Script',cursive", fontSize: 24, color: BROWN, fontWeight: 700, marginBottom: 4 }}>Daily habits</div>
      <div style={{ fontSize: 12, color: BROWN_LIGHT, marginBottom: 16, fontFamily: "'Jost',sans-serif" }}>Check off today's dot — only today counts! 5 ✦ per day, 20 ✦ bonus for a full week</div>

      <div style={{ background: WHITE, border: "1.5px solid #F0E070", borderRadius: 20, padding: "18px 20px", boxShadow: "0 2px 16px rgba(200,160,0,0.07)", marginBottom: 28 }}>
        {/* Day labels */}
        <div style={{ display: "flex", alignItems: "center", marginBottom: 8, paddingRight: 28 }}>
          <div style={{ flex: 1 }} />
          <div style={{ display: "flex", gap: 6 }}>
            {last7.map(d => (
              <div key={d} style={{ width: isMobile ? 26 : 30, textAlign: "center", fontSize: 10, color: d === today ? BROWN : BROWN_LIGHT, fontFamily: "'Jost',sans-serif", fontWeight: d === today ? 800 : 600 }}>
                {new Date(d).toLocaleDateString("en-US", { weekday: "short" }).slice(0,2)}
              </div>
            ))}
          </div>
        </div>

        {habits.length === 0 && !showHabitInput && (
          <div style={{ fontSize: 13, color: BROWN_LIGHT, fontFamily: "'Jost',sans-serif", fontStyle: "italic", padding: "16px 0", textAlign: "center" }}>No habits yet — add one below!</div>
        )}

        {habits.map(h => {
          const weekDone = last7.filter(d => (h.log||[]).includes(d)).length;
          return (
            <div key={h.id} style={{ display: "flex", flexDirection: isMobile ? "column" : "row", alignItems: isMobile ? "flex-start" : "center", gap: isMobile ? 6 : 12, padding: "10px 0", borderBottom: "1px solid #F5EDD0" }}>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontSize: 14, fontWeight: 700, color: BROWN, fontFamily: "'Jost',sans-serif" }}>{h.text}</div>
                <div style={{ fontSize: 11, color: BROWN_LIGHT, fontFamily: "'Jost',sans-serif", marginTop: 2 }}>{weekDone}/7 this week</div>
              </div>
              <div style={{ display: "flex", gap: isMobile ? 4 : 6, alignItems: "center", width: isMobile ? "100%" : undefined, justifyContent: isMobile ? "space-between" : undefined }}>
                <div style={{ display: "flex", gap: isMobile ? 3 : 6 }}>
                  {last7.map(d => (
                    <FlowerDot key={d} filled={(h.log||[]).includes(d)} isToday={d === today} dateStr={d} habitId={h.id} isMobile={isMobile} />
                  ))}
                </div>
                <div onClick={() => setHabits(prev => prev.filter(x => x.id !== h.id))} style={{ cursor: "pointer", color: BROWN_LIGHT, fontSize: 13, opacity: 0.35, flexShrink: 0 }}>✕</div>
              </div>
            </div>
          );
        })}

        {showHabitInput ? (
          <div style={{ marginTop: 12 }}>
            <input autoFocus value={newHabit} onChange={e => setNewHabit(e.target.value)}
              onKeyDown={e => { if(e.key==="Enter") addHabit(); if(e.key==="Escape") setShowHabitInput(false); }}
              placeholder="New habit..."
              style={{ width: "100%", padding: "8px 12px", borderRadius: 10, border: `1.5px solid ${GOLD}`, background: PARCHMENT, color: BROWN, fontFamily: "'Jost',sans-serif", fontSize: 13, outline: "none", boxSizing: "border-box", marginBottom: 8 }}
            />
            <div style={{ display: "flex", gap: 6 }}>
              <button onClick={addHabit} style={{ flex: 1, background: `linear-gradient(135deg,#FFE878,${GOLD})`, border: "none", borderRadius: 10, padding: "8px", cursor: "pointer", fontFamily: "'Jost',sans-serif", fontWeight: 700, fontSize: 13, color: BROWN }}>Add</button>
              <button onClick={() => setShowHabitInput(false)} style={{ background: PARCHMENT, border: `1px solid ${GOLD}`, borderRadius: 10, padding: "8px 14px", cursor: "pointer", fontFamily: "'Jost',sans-serif", fontWeight: 600, fontSize: 13, color: BROWN_MID }}>Cancel</button>
            </div>
          </div>
        ) : (
          <button onClick={() => setShowHabitInput(true)} style={{ marginTop: 12, width: "100%", background: "transparent", border: `1.5px dashed ${GOLD}`, borderRadius: 12, padding: "10px", cursor: "pointer", fontFamily: "'Jost',sans-serif", fontWeight: 600, fontSize: 13, color: BROWN_LIGHT }}>+ Add habit</button>
        )}
      </div>

      {/* ── Long term goals / Dreams ── */}
      <div style={{ fontFamily: "'Dancing Script',cursive", fontSize: 24, color: BROWN, fontWeight: 700, marginBottom: 4 }}>Long term dreams</div>
      <div style={{ fontSize: 12, color: BROWN_LIGHT, marginBottom: 16, fontFamily: "'Jost',sans-serif" }}>Big goals you're working towards</div>

      <div style={{ background: WHITE, border: "1.5px solid #F0E070", borderRadius: 20, padding: "18px 20px", boxShadow: "0 2px 16px rgba(200,160,0,0.07)" }}>
        {dreams.length === 0 && !showDreamInput && (
          <div style={{ fontSize: 13, color: BROWN_LIGHT, fontFamily: "'Jost',sans-serif", fontStyle: "italic", padding: "16px 0", textAlign: "center" }}>What do you dream of? ✦</div>
        )}

        {dreams.map(d => (
          <div key={d.id} style={{ display: "flex", alignItems: "center", gap: 12, padding: "12px 0", borderBottom: "1px solid #F5EDD0" }}>
            <div style={{ width: 32, height: 32, borderRadius: 10, background: HEX_COLOR, border: `1.5px solid ${GOLD}`, flexShrink: 0, display: "flex", alignItems: "center", justifyContent: "center" }}>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z" fill={GOLD} stroke={BROWN_LIGHT} strokeWidth="1"/></svg>
            </div>
            <div style={{ flex: 1, fontSize: 14, fontWeight: 700, color: BROWN, fontFamily: "'Jost',sans-serif" }}>{d.text}</div>
            <div onClick={() => setDreams(prev => prev.filter(x => x.id !== d.id))} style={{ cursor: "pointer", color: BROWN_LIGHT, fontSize: 13, opacity: 0.35 }}>✕</div>
          </div>
        ))}

        {showDreamInput ? (
          <div style={{ marginTop: 12 }}>
            <input autoFocus value={newDream} onChange={e => setNewDream(e.target.value)}
              onKeyDown={e => { if(e.key==="Enter") addDream(); if(e.key==="Escape") setShowDreamInput(false); }}
              placeholder="A big dream..."
              style={{ width: "100%", padding: "8px 12px", borderRadius: 10, border: `1.5px solid ${GOLD}`, background: PARCHMENT, color: BROWN, fontFamily: "'Jost',sans-serif", fontSize: 13, outline: "none", boxSizing: "border-box", marginBottom: 8 }}
            />
            <div style={{ display: "flex", gap: 6 }}>
              <button onClick={addDream} style={{ flex: 1, background: `linear-gradient(135deg,#FFE878,${GOLD})`, border: "none", borderRadius: 10, padding: "8px", cursor: "pointer", fontFamily: "'Jost',sans-serif", fontWeight: 700, fontSize: 13, color: BROWN }}>Add ✦</button>
              <button onClick={() => setShowDreamInput(false)} style={{ background: PARCHMENT, border: `1px solid ${GOLD}`, borderRadius: 10, padding: "8px 14px", cursor: "pointer", fontFamily: "'Jost',sans-serif", fontWeight: 600, fontSize: 13, color: BROWN_MID }}>Cancel</button>
            </div>
          </div>
        ) : (
          <button onClick={() => setShowDreamInput(true)} style={{ marginTop: 12, width: "100%", background: "transparent", border: `1.5px dashed ${GOLD}`, borderRadius: 12, padding: "10px", cursor: "pointer", fontFamily: "'Jost',sans-serif", fontWeight: 600, fontSize: 13, color: BROWN_LIGHT }}>+ Add dream</button>
        )}
      </div>
    </div>
  );
}

// ─── Helpers ──────────────────────────────────────────────────────────────────
function getWeekKey() {
  const d = new Date();
  const day = d.getDay();
  const diff = d.getDate() - day + (day === 0 ? -6 : 1);
  const mon = new Date(d.setDate(diff));
  return mon.toISOString().slice(0, 10);
}

export default function HoneyDo() {
  const load = (k, d) => { if (window.hdPreloaded && window.hdPreloaded.hasOwnProperty(k)) return window.hdPreloaded[k] ?? d; try { const l = localStorage.getItem(k); return l ? JSON.parse(l) : d; } catch { return d; } };

  const [tasks,       setTasks]      = useState(() => load("hd4-tasks",    []));
  const [hives,       setHives]      = useState(() => {
    const saved = load("hd4-hives", DEFAULT_HIVES);
    // Strip any legacy emojis from hive names
    return saved.map(h => ({ ...h, name: h.name.replace(/^[\u{1F000}-\u{1FFFF}\u{2600}-\u{27FF}\s]+/u, "").trim() || h.name }));
  });
  const [activeHive,  setActiveHive] = useState("personal");
  const [view,        setView]       = useState("grid");
  const [tab,         setTab]        = useState("hive");
  const [sidebarOpen, setSidebarOpen] = useState(false);
  const [isMobile,    setIsMobile]    = useState(() => typeof window !== "undefined" && window.innerWidth < 768);
  useEffect(() => {
    const handler = () => setIsMobile(window.innerWidth < 768);
    window.addEventListener("resize", handler);
    return () => window.removeEventListener("resize", handler);
  }, []);
  const [showTimeInPopup, setShowTimeInPopup] = useState(() => { try { return JSON.parse(localStorage.getItem("hd4-listShowTime") ?? "false"); } catch { return false; } });
  const [weeklyGoals, setWeeklyGoals]= useState(() => load("hd4-weekly", []));
  const [habits,      setHabits]     = useState(() => load("hd4-habits", []));
  const [dreams,      setDreams]     = useState(() => load("hd4-dreams", []));
  // positions: { [taskId]: { col, row } }
  const [positions,   setPositions]  = useState(() => load("hd4-pos",      {}));
  const [showAdd,     setShowAdd]    = useState(false);
  const [showPom,     setShowPom]    = useState(false);
  const [showShop,    setShowShop]   = useState(false);
  const [pollen,      setPollen]     = useState(() => load("hd4-pollen", 0));
  const [unlocked,    setUnlocked]   = useState(() => load("hd4-unlocked", ["none"]));
  const [equippedHats, setEquippedHats] = useState(() => { const v = load("hd4-hat", ["none"]); return Array.isArray(v) ? v : [v]; });
  const [bearMsg,     setBearMsg]    = useState("");
  const [bearWobble,  setBearWobble] = useState(false);
  const [newHiveName, setNewHiveName]= useState("");
  const [showNewHive, setShowNewHive]= useState(false);
  const [sortMode,    setSortMode]    = useState("default");
  const [intentions,  setIntentions] = useState(() => { const v = load("hd4-intention", []); return Array.isArray(v) ? v : (v && v.text ? [v] : []); });
  const [renamingHive,   setRenamingHive]   = useState(null);
  const [iconPickerHive, setIconPickerHive] = useState(null);
  const [editingIntention, setEditingIntention] = useState(false);
  const [intentionDraft,   setIntentionDraft]   = useState("");

  // ── Drag state stored in refs so pointer callbacks always see latest ──────
  // dragState.id         = taskId being dragged (or null)
  // dragState.ghostX/Y  = current pixel position of dragged hex centre
  // dragState.snapCol/Row = current snap target cell
  const dragState = useRef({ id: null, ghostX: 0, ghostY: 0, snapCol: 0, snapRow: 0, offX: 0, offY: 0 });
  const [dragRender, setDragRender] = useState(null); // {id, ghostX, ghostY, snapCol, snapRow}
  const [popup, setPopup] = useState(null); // { taskId, screenX, screenY }

  const svgRef = useRef();

  // Persist — wait 2s after mount before saving, so we don't overwrite Firebase data on first load
  const _saveReady = useRef(false);
  useEffect(() => { const t = setTimeout(() => { _saveReady.current = true; }, 2000); return () => clearTimeout(t); }, []);
  const _save = (k, v) => { if (!_saveReady.current) return; if(window.hdSave) window.hdSave(k,v); else try{localStorage.setItem(k,JSON.stringify(v));}catch{} };
  useEffect(() => { _save("hd4-tasks",     tasks);        }, [tasks]);
  useEffect(() => { _save("hd4-hives",     hives);        }, [hives]);
  useEffect(() => { _save("hd4-pos",       positions);    }, [positions]);
  useEffect(() => { _save("hd4-pollen",    pollen);       }, [pollen]);
  useEffect(() => { _save("hd4-unlocked",  unlocked);     }, [unlocked]);
  useEffect(() => { _save("hd4-hat",       equippedHats); }, [equippedHats]);
  useEffect(() => { _save("hd4-intention", intentions);   }, [intentions]);
  useEffect(() => { _save("hd4-weekly",    weeklyGoals);   }, [weeklyGoals]);
  useEffect(() => { _save("hd4-habits",    habits);        }, [habits]);
  useEffect(() => { _save("hd4-dreams",    dreams);        }, [dreams]);

  // ── Firebase live sync — update state when another device changes data ──
  useEffect(() => {
    if (!window.hdSubscribe) return;
    window.hdSubscribe("hd4-tasks",     v => { if(Array.isArray(v)) setTasks(v); });
    window.hdSubscribe("hd4-hives",     v => { if(Array.isArray(v)) setHives(v); });
    window.hdSubscribe("hd4-pos",       v => { if(v && typeof v === "object") setPositions(v); });
    window.hdSubscribe("hd4-pollen",    v => { if(typeof v === "number") setPollen(v); });
    window.hdSubscribe("hd4-unlocked",  v => { if(Array.isArray(v)) setUnlocked(v); });
    window.hdSubscribe("hd4-hat",       v => { if(v) setEquippedHats(Array.isArray(v) ? v : [v]); });
    window.hdSubscribe("hd4-intention", v => { if(Array.isArray(v)) setIntentions(v); });
    return () => {
      ["hd4-tasks","hd4-hives","hd4-pos","hd4-pollen","hd4-unlocked","hd4-hat","hd4-intention"]
        .forEach(k => window.hdUnsubscribe && window.hdUnsubscribe(k));
    };
  }, []);

  const hiveTasks = (() => {
    const filtered = tasks.filter(t => t.hiveId === activeHive);
    if (sortMode === "priority") {
      const order = { high: 0, medium: 1, low: 2 };
      return [...filtered].sort((a, b) => (order[a.priority||"medium"] - order[b.priority||"medium"]));
    }
    if (sortMode === "due") return [...filtered].sort((a, b) => { const ad = a.dueDate||"9"; const bd = b.dueDate||"9"; return ad < bd ? -1 : 1; });
    if (sortMode === "done") return [...filtered].sort((a, b) => Number(a.completed) - Number(b.completed));
    return filtered;
  })();
  const completed = hiveTasks.filter(t => t.completed).length;
  const total     = hiveTasks.length;

  const handleToggleEquip = (hatId) => {
    setEquippedHats(prev => {
      if (hatId === "none") return ["none"];
      const without = prev.filter(h => h !== "none");
      return without.includes(hatId) ? (without.filter(h => h !== hatId).length ? without.filter(h => h !== hatId) : ["none"]) : [...without, hatId];
    });
  };

  const handleColorChange = (taskId, colorId) => {
    setTasks(ts => ts.map(t => t.id === taskId ? { ...t, color: colorId } : t));
  };

  const handleNoteChange = (taskId, note) => {
    setTasks(ts => ts.map(t => t.id === taskId ? { ...t, note } : t));
  };

  const handlePriorityChange = (taskId, priority) => {
    setTasks(ts => ts.map(t => t.id === taskId ? { ...t, priority } : t));
  };

  const handleTitleChange = (taskId, title) => {
    setTasks(ts => ts.map(t => t.id === taskId ? { ...t, title } : t));
  };

  const handleHiveChange = (taskId, hiveId) => {
    setTasks(ts => ts.map(t => t.id === taskId ? { ...t, hiveId } : t));
  };

  const handleDueDateChange = (taskId, dueDate) => {
    setTasks(ts => ts.map(t => t.id === taskId ? { ...t, dueDate } : t));
  };

  const handleUpdate = (taskId, fields) => {
    setTasks(ts => ts.map(t => t.id === taskId ? { ...t, ...fields } : t));
  };

  const handleScheduleChange = (taskId, time, duration) => {
    const today = new Date().toDateString();
    setTasks(ts => ts.map(t => t.id === taskId ? { ...t, scheduledTime: time, scheduledDuration: duration, scheduledDate: time ? today : "" } : t));
  };


  const triggerBear = msg => {
    setBearMsg(msg); setBearWobble(true);
    setTimeout(() => { setBearMsg(""); setBearWobble(false); }, 3000);
  };

  const renameHive = (id, name) => {
    if (!name.trim()) { setRenamingHive(null); return; }
    setHives(prev => prev.map(h => h.id === id ? { ...h, name: name.trim() } : h));
    setRenamingHive(null);
    triggerBear("Hive renamed! 🍯");
  };


  const setHiveIconKey = (id, iconKey) => {
    setHives(prev => prev.map(h => h.id === id ? { ...h, iconKey } : h));
  };

  const [confirmDeleteHive, setConfirmDeleteHive] = useState(null);

  const deleteHive = (id) => {
    const fallback = hives.find(h => h.id !== id)?.id;
    if (!fallback) return;
    // move tasks to fallback hive
    setTasks(prev => prev.map(t => t.hiveId === id ? { ...t, hiveId: fallback } : t));
    setHives(prev => prev.filter(h => h.id !== id));
    if (activeHive === id) setActiveHive(fallback);
    triggerBear("Hive dissolved 🌿");
  };


  // Auto-place tasks missing grid positions
  useEffect(() => {
    const missing = tasks.filter(t => !positions[t.id]);
    if (!missing.length) return;
    // build occupancy by hive
    const newPos = { ...positions };
    const hiveGroups = {};
    tasks.filter(t => positions[t.id]).forEach(t => {
      if (!hiveGroups[t.hiveId]) hiveGroups[t.hiveId] = {};
      hiveGroups[t.hiveId][`${positions[t.id].col},${positions[t.id].row}`] = true;
    });
    missing.forEach(t => {
      if (!hiveGroups[t.hiveId]) hiveGroups[t.hiveId] = {};
      const occ = hiveGroups[t.hiveId];
      let col = 0, row = 0;
      while (occ[`${col},${row}`]) { col++; if (col > 7) { col = 0; row++; } }
      newPos[t.id] = { col, row };
      occ[`${col},${row}`] = true;
    });
    setPositions(newPos);
  // eslint-disable-next-line
  }, [tasks.length]);

  const handleAdd = ({ title, hiveId, priority, dueDate }) => {
    const id = uid();
    // find first free cell in target hive
    const occ = {};
    tasks.filter(t => t.hiveId === hiveId && positions[t.id]).forEach(t => {
      occ[`${positions[t.id].col},${positions[t.id].row}`] = true;
    });
    let col = 0, row = 0;
    while (occ[`${col},${row}`]) { col++; if (col > 7) { col = 0; row++; } }
    setPositions(p => ({ ...p, [id]: { col, row } }));
    setTasks(prev => [...prev, { id, title, hiveId, priority, dueDate, completed: false }]);
    triggerBear("New task added!");
  };

  const handleToggle = id => {
    setTasks(prev => prev.map(t => {
      if (t.id !== id) return t;
      const nowDone = !t.completed;
      if (nowDone) {
        setPollen(p => p + 10);
        triggerBear([
          "Honey-sweet! +10 ✦",
          "You're on a roll!",
          "Amazing work! ✨",
          "Bear is proud! 🐻",
        ][Math.floor(Math.random() * 4)]);
      }
      return { ...t, completed: nowDone };
    }));
  };

  const handleDelete = id => {
    setTasks(prev => prev.filter(t => t.id !== id));
    setPositions(p => { const n = { ...p }; delete n[id]; return n; });
  };

  // ── Build occupancy map for current hive (for snap logic) ──────────────────
  // Returns { "col,row": taskId }
  const buildOccMap = (excludeId = null) => {
    const map = {};
    hiveTasks.forEach(t => {
      if (t.id === excludeId) return;
      const pos = positions[t.id];
      if (pos) map[`${pos.col},${pos.row}`] = t.id;
    });
    return map;
  };

  // ── Pointer handlers ───────────────────────────────────────────────────────
  const longPressTimer = useRef(null);

  const onPointerDown = (e, taskId) => {
    // Don't preventDefault here — lets scroll work initially on mobile
    e.stopPropagation();

    const svg  = svgRef.current;
    const rect = svg.getBoundingClientRect();
    const px   = (e.clientX - rect.left) * (SVG_W / rect.width);
    const py   = (e.clientY - rect.top)  * (SVG_H / rect.height);

    const pos = positions[taskId] || { col: 0, row: 0 };
    const { x: cx, y: cy } = cellCenter(pos.col, pos.row);

    // Store pending drag info but don't activate yet
    dragState.current = {
      id: null,          // not active until long-press fires
      pendingId: taskId,
      pointerId: e.pointerId,
      element: e.currentTarget,
      ghostX: cx, ghostY: cy,
      snapCol: pos.col, snapRow: pos.row,
      offX: px - cx, offY: py - cy,
      startScreenX: e.clientX, startScreenY: e.clientY,
      hasMoved: false,
    };

    // Desktop: activate drag immediately. Mobile: long-press (280ms) to distinguish from scroll
    clearTimeout(longPressTimer.current);
    if (e.pointerType !== "touch") {
      e.preventDefault();
      try { e.currentTarget.setPointerCapture(e.pointerId); } catch(err) {}
      dragState.current.id = taskId;
      setDragRender({ id: taskId, ghostX: cx, ghostY: cy, snapCol: pos.col, snapRow: pos.row });
    } else {
      longPressTimer.current = setTimeout(() => {
        const ds = dragState.current;
        if (!ds.pendingId || ds.hasMoved) return;
        try { ds.element.setPointerCapture(ds.pointerId); } catch(err) {}
        ds.id = ds.pendingId;
        setDragRender({ id: ds.id, ghostX: ds.ghostX, ghostY: ds.ghostY, snapCol: ds.snapCol, snapRow: ds.snapRow });
      }, 150);
    }
  };

  const onPointerMove = e => {
    const ds = dragState.current;

    // Track movement to detect scroll-vs-drag during long-press wait
    if (ds.pendingId && !ds.id) {
      const dx = e.clientX - ds.startScreenX;
      const dy = e.clientY - ds.startScreenY;
      if (Math.hypot(dx, dy) > 8) {
        // Moved too much — cancel long press, let scroll happen
        ds.hasMoved = true;
        clearTimeout(longPressTimer.current);
      }
      return;
    }

    if (!ds.id) return;
    if (e.pointerType !== "touch") e.preventDefault();

    const svg  = svgRef.current;
    const rect = svg.getBoundingClientRect();
    const scaleX = SVG_W / rect.width;
    const scaleY = SVG_H / rect.height;
    const px = (e.clientX - rect.left) * scaleX;
    const py = (e.clientY - rect.top)  * scaleY;

    const ghostX = px - ds.offX;
    const ghostY = py - ds.offY;

    const dx = e.clientX - ds.startScreenX;
    const dy = e.clientY - ds.startScreenY;
    if (Math.hypot(dx, dy) > 6) ds.hasMoved = true;

    const occ  = buildOccMap(ds.id);
    const snap = nearestCell(ghostX, ghostY, occ, ds.id);

    ds.ghostX  = ghostX;
    ds.ghostY  = ghostY;
    ds.snapCol = snap.col;
    ds.snapRow = snap.row;

    if (!ds.rafPending) {
      ds.rafPending = true;
      requestAnimationFrame(() => {
        ds.rafPending = false;
        if (!ds.id) return;
        setDragRender({ id: ds.id, ghostX: ds.ghostX, ghostY: ds.ghostY, snapCol: ds.snapCol, snapRow: ds.snapRow });
      });
    }
  };

  const onPointerUp = e => {
    clearTimeout(longPressTimer.current);
    const ds = dragState.current;

    if (ds.pendingId && !ds.id && !ds.hasMoved) {
      // Short tap — open popup
      setPopup({ taskId: ds.pendingId, screenX: e.clientX + 12, screenY: e.clientY - 10 });
    } else if (ds.id) {
      if (!ds.hasMoved) {
        setPopup({ taskId: ds.id, screenX: e.clientX + 12, screenY: e.clientY - 10 });
      } else {
        setPositions(p => ({ ...p, [ds.id]: { col: ds.snapCol, row: ds.snapRow } }));
      }
    }

    dragState.current = { id: null };
    setDragRender(null);
  };

  // SVG canvas size (dynamic based on task count)
  const GRID_COLS = 8;
  const GRID_ROWS = Math.max(4, Math.ceil(total / GRID_COLS) + 3);
  const SVG_W = GRID_COLS * CS + OFF + 40;
  const SVG_H = GRID_ROWS * RS + HH + 40;

  const [newHiveIcon, setNewHiveIcon] = useState("hex");

  const addHive = () => {
    if (!newHiveName.trim()) return;
    const id = uid();
    setHives(prev => [...prev, { id, name: newHiveName.trim(), iconKey: newHiveIcon }]);
    setActiveHive(id);
    setNewHiveName(""); setNewHiveIcon("hex"); setShowNewHive(false);
  };

  return (
    <>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Playfair+Display:ital,wght@0,400;0,600;1,400;1,600&family=Jost:wght@300;400;500;600&display=swap');
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: ${CREAM}; font-family: 'Jost', sans-serif; }

        @keyframes bearBounce {
          0%   { transform: translateY(0)    scale(1)    rotate(0deg);  }
          30%  { transform: translateY(-14px) scale(1.07) rotate(-4deg); }
          60%  { transform: translateY(-6px)  scale(1.03) rotate(3deg);  }
          100% { transform: translateY(0)    scale(1)    rotate(0deg);  }
        }
        @keyframes bearIdle {
          0%,100% { transform: translateY(0) rotate(0deg);    }
          35%     { transform: translateY(-4px) rotate(-2deg); }
          70%     { transform: translateY(-2px) rotate(1.5deg);}
        }
        @keyframes slideUp {
          from { transform: translateY(28px); opacity: 0; }
          to   { transform: translateY(0);    opacity: 1; }
        }
        @keyframes speechPop {
          from { transform: translateX(-50%) scale(0.65); opacity: 0; }
          to   { transform: translateX(-50%) scale(1);    opacity: 1; }
        }
        @keyframes beeFloat {
          0%,100% { transform: translateY(0)   rotate(-7deg); }
          50%     { transform: translateY(-9px) rotate(7deg);  }
        }
        .honey-time::-webkit-calendar-picker-indicator {
          filter: invert(55%) sepia(40%) saturate(600%) hue-rotate(5deg) brightness(95%);
          cursor: pointer;
          opacity: 0.8;
          border-radius: 4px;
          padding: 1px;
        }
        .honey-time::-webkit-datetime-edit { color: ${BROWN}; font-family: 'Jost', sans-serif; }
        .honey-time::-webkit-datetime-edit-fields-wrapper { background: transparent; }
        .honey-time::-webkit-datetime-edit-hour-field:focus,
        .honey-time::-webkit-datetime-edit-minute-field:focus,
        .honey-time::-webkit-datetime-edit-ampm-field:focus { background: #FFE878; border-radius: 3px; color: ${BROWN}; }
        @keyframes snapPulse {
          0%,100% { opacity: 0.25; }
          50%     { opacity: 0.7;  }
        }
        @keyframes popupIn {
          from { transform: scale(0.82) translateY(6px); opacity: 0; }
          to   { transform: scale(1)    translateY(0);   opacity: 1; }
        }
        ::-webkit-scrollbar       { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: ${HEX_COLOR}; border-radius: 3px; }
        ::-webkit-scrollbar-thumb { background: ${GOLD};      border-radius: 3px; }
        @media (max-width: 767px) {
          .hd-header-title { font-size: 22px !important; }
          .hd-pollen-btn { padding: 5px 10px !important; font-size: 12px !important; }
          .hd-focus-btn { display: none !important; }
          .hd-tab-label { font-size: 12px !important; padding: 5px 9px !important; }
        }
      `}</style>

      <div style={{ minHeight: "100vh", background: CREAM }}>

        {/* ── Header ── */}
        <header style={{
          background: WHITE, borderBottom: `3px solid #F0E070`,
          padding: "0 24px", position: "sticky", top: 0, zIndex: 100,
          boxShadow: "0 2px 18px rgba(200,160,0,0.09)"
        }}>
          <div style={{
            maxWidth: 1160, margin: "0 auto",
            display: "flex", alignItems: "center", justifyContent: "space-between",
            height: isMobile ? "auto" : 64,
            flexWrap: isMobile ? "wrap" : "nowrap",
            padding: isMobile ? "8px 0" : "0",
            gap: isMobile ? 6 : 0,
          }}>
            <div style={{ display: "flex", alignItems: "center", gap: isMobile ? 6 : 10 }}>
              {/* Hamburger on mobile */}
              {isMobile && (
                <button onClick={() => setSidebarOpen(o => !o)} style={{
                  background: "none", border: "none", cursor: "pointer", padding: 6,
                  display: "flex", flexDirection: "column", gap: 4, alignItems: "center", justifyContent: "center"
                }}>
                  <div style={{ width: 20, height: 2, background: BROWN, borderRadius: 2 }}/>
                  <div style={{ width: 20, height: 2, background: BROWN, borderRadius: 2 }}/>
                  <div style={{ width: 20, height: 2, background: BROWN, borderRadius: 2 }}/>
                </button>
              )}
              {/* Small SVG honey hex logo */}
              <svg width="30" height="30" viewBox="0 0 60 60">

                        <g key="drag-ghost" style={{ pointerEvents: "none" }}>
                          <HexTask task={task}
                            cx={dragRender.ghostX} cy={dragRender.ghostY} size={S}
                            dragging={true} />
                        </g>
                      );
                    })()}
                  </svg>
                  </div>
                )}
              </div>
            )}

            {/* ── Weekly Goals Strip ── */}
            {weeklyGoals.filter(g => g.week === getWeekKey()).length > 0 && (
              <div style={{ background: WHITE, border: "1.5px solid #F0E070", borderRadius: 18, padding: "12px 18px", marginTop: 14, boxShadow: "0 2px 10px rgba(200,160,0,0.06)" }}>
                <div style={{ fontFamily: "'Dancing Script',cursive", fontSize: 16, color: BROWN, fontWeight: 700, marginBottom: 10 }}>This week's goals</div>
                <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                  {weeklyGoals.filter(g => g.week === getWeekKey()).map(g => (
                    <div key={g.id}
                      onClick={() => {
                        setWeeklyGoals(prev => prev.map(x => {
                          if (x.id !== g.id) return x;
                          if (!x.done) setPollen(p => p + (x.pollen || 0));
                          else setPollen(p => Math.max(0, p - (x.pollen || 0)));
                          return { ...x, done: !x.done };
                        }));
                      }}
                      style={{ display: "flex", alignItems: "center", gap: 6, background: g.done ? PARCHMENT : WHITE, border: `1.5px solid ${g.done ? "#C4956A" : GOLD}`, borderRadius: 10, padding: "5px 10px", opacity: g.done ? 0.65 : 1, cursor: "pointer", transition: "all 0.18s" }}>
                      <div style={{ width: 18, height: 18, borderRadius: "50%", border: `2px solid ${g.done ? "#C4956A" : GOLD}`, background: g.done ? "#C4956A" : "transparent", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 11, color: "white", flexShrink: 0, transition: "all 0.18s" }}>
                        {g.done && "✿"}
                      </div>
                      <span style={{ fontSize: 12, color: BROWN, fontFamily: "'Jost',sans-serif", fontWeight: 600, textDecoration: g.done ? "line-through" : "none" }}>{g.text}</span>
                      {g.pollen > 0 && <span style={{ fontSize: 10, color: BROWN_LIGHT, fontFamily: "'Jost',sans-serif" }}>✦{g.pollen}</span>}
                    </div>
                  ))}
                </div>
              </div>
            )}

            {/* ── List View ── */}
            {view === "list" && (
              <div>
                {hiveTasks.length === 0 && (
                  <div style={{ textAlign: "center", padding: "65px 20px", color: BROWN_LIGHT }}>
                    <div style={{ marginBottom: 12, opacity: 0.35 }}>
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none">
                  <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z" stroke="#C4956A" strokeWidth="1.6" fill="#FDF5DC"/>
                  <polyline points="14 2 14 8 20 8" stroke="#C4956A" strokeWidth="1.6" strokeLinejoin="round"/>
                  <line x1="8" y1="13" x2="16" y2="13" stroke="#C4956A" strokeWidth="1.4" strokeLinecap="round"/>
                  <line x1="8" y1="17" x2="13" y2="17" stroke="#C4956A" strokeWidth="1.4" strokeLinecap="round"/>
                </svg>
              </div>
                    <p style={{ fontFamily: "'Jost',sans-serif", fontSize: 16, fontWeight: 700 }}>No tasks yet!</p>
                  </div>
                )}
                {hiveTasks.filter(t => !t.completed).map(t => (
                  <ListRow key={t.id} task={t} onToggle={handleToggle} onDelete={handleDelete} />
                ))}
                {hiveTasks.some(t => t.completed) && <>
                  <div style={{
                    fontSize: 11, color: BROWN_LIGHT, fontWeight: 800,
                    textTransform: "uppercase", letterSpacing: 1,
                    margin: "20px 0 9px", fontFamily: "'Jost',sans-serif"
                  }}>✿ Completed</div>
                  {hiveTasks.filter(t => t.completed).map(t => (
                    <ListRow key={t.id} task={t} onToggle={handleToggle} onDelete={handleDelete} />
                  ))}
                </>}
              </div>
            )}
            </>)}

            {/* ══════════════════════════════════════════════════════
                TODAY TAB
            ══════════════════════════════════════════════════════ */}
            {tab === "list" && (
              <TodayTab
                tasks={tasks}
                hives={hives}
                weeklyGoals={weeklyGoals}
                setWeeklyGoals={setWeeklyGoals}
                intentions={intentions}
                onToggle={handleToggle}
                onDelete={handleDelete}
                onAdd={handleAdd}
                onUpdate={handleUpdate}
                activeHive={activeHive}
                setPollen={setPollen}
                onShowTimeChange={v => { setShowTimeInPopup(v); }}
                isMobile={isMobile}
              />
            )}

            {/* ══════════════════════════════════════════════════════
                GARDEN TAB
            ══════════════════════════════════════════════════════ */}
            {tab === "garden" && (
              <GardenTab
                habits={habits}
                setHabits={setHabits}
                dreams={dreams}
                setDreams={setDreams}
                setPollen={setPollen}
                triggerBear={triggerBear}
                isMobile={isMobile}
              />
            )}

          </main>
        </div>
      </div>

      {tab === "hive" && <button onClick={() => setShowAdd(true)} style={{
        position: "fixed", bottom: isMobile ? 20 : 30, right: isMobile ? 16 : 30, width: 54, height: 54,
        borderRadius: "50%", border: "none",
        background: `linear-gradient(135deg, #FFE878, ${GOLD})`,
        boxShadow: `0 6px 28px ${GOLD}88, 0 2px 10px rgba(0,0,0,0.16)`,
        cursor: "pointer",
        display: "flex", alignItems: "center", justifyContent: "center",
        animation: "beeFloat 2.4s ease-in-out infinite", zIndex: 200,
      }}
        onMouseEnter={e => { e.currentTarget.style.animation="none"; e.currentTarget.style.transform="scale(1.13)"; }}
        onMouseLeave={e => { e.currentTarget.style.animation="beeFloat 2.4s ease-in-out infinite"; e.currentTarget.style.transform=""; }}
        title="Add new task"
      >
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
          <line x1="12" y1="4" x2="12" y2="20" stroke={BROWN} strokeWidth="2.5" strokeLinecap="round"/>
          <line x1="4" y1="12" x2="20" y2="12" stroke={BROWN} strokeWidth="2.5" strokeLinecap="round"/>
        </svg>
      </button>}

      {/* ── Modals ── */}
      {confirmDeleteHive && (
        <div style={{ position: "fixed", inset: 0, background: "rgba(50,30,5,0.4)", zIndex: 2000, display: "flex", alignItems: "center", justifyContent: "center", backdropFilter: "blur(4px)" }}>
          <div style={{ background: WHITE, borderRadius: 20, padding: 28, width: 280, textAlign: "center", border: "2px solid #F0E070", boxShadow: "0 20px 60px rgba(0,0,0,0.2)" }}>
            <div style={{ fontSize: 15, fontWeight: 800, color: BROWN, fontFamily: "'Jost',sans-serif", marginBottom: 8 }}>Delete this hive?</div>
            <div style={{ fontSize: 12, color: BROWN_LIGHT, fontFamily: "'Jost',sans-serif", marginBottom: 20 }}>All tasks inside will move to another hive.</div>
            <div style={{ display: "flex", gap: 8 }}>
              <button onClick={() => setConfirmDeleteHive(null)} style={{ flex: 1, padding: "10px", borderRadius: 12, border: `1.5px solid ${GOLD}`, background: PARCHMENT, color: BROWN, fontFamily: "'Jost',sans-serif", fontWeight: 700, fontSize: 13, cursor: "pointer" }}>Cancel</button>
              <button onClick={() => { deleteHive(confirmDeleteHive); setConfirmDeleteHive(null); }} style={{ flex: 1, padding: "10px", borderRadius: 12, border: "none", background: "linear-gradient(135deg,#FFF0EE,#FDDCCC)", color: "#C0522A", fontFamily: "'Jost',sans-serif", fontWeight: 800, fontSize: 13, cursor: "pointer" }}>Delete</button>
            </div>
          </div>
        </div>
      )}
      {showAdd  && <AddModal hives={hives} activeHive={activeHive} onAdd={handleAdd} onClose={() => setShowAdd(false)} />}
      {showPom  && <Pomodoro onClose={() => setShowPom(false)} />}
      {showShop && (
        <HatShop pollen={pollen} unlocked={unlocked} equipped={equippedHats}
          onUnlock={(id, cost) => { setPollen(p => p-cost); setUnlocked(p => [...p, id]); triggerBear("New hat!"); }}
          onToggleEquip={handleToggleEquip}
          onClose={() => setShowShop(false)}
        />
      )}
      {popup && (() => {
        const task = tasks.find(t => t.id === popup.taskId);
        return task ? (
          <TaskPopup
            task={task}
            x={popup.screenX} y={popup.screenY}
            onComplete={handleToggle}
            onDelete={handleDelete}
            onColorChange={handleColorChange}
            onNoteChange={handleNoteChange}
            onPriorityChange={handlePriorityChange}
            onHiveChange={handleHiveChange}
            onTitleChange={handleTitleChange}
            onDueDateChange={handleDueDateChange}
            onScheduleChange={handleScheduleChange}
            showTime={showTimeInPopup}
            hives={hives}
            onClose={() => setPopup(null)}
          />
        ) : null;
      })()}
    </>
  );
}

    let _mounted = false;
    function mount() { if (_mounted) return; _mounted = true; ReactDOM.createRoot(document.getElementById("root")).render(<App />); }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Playfair+Display:wght@600&family=Jost:wght@400;600;700&display=swap" rel="stylesheet"/>
</body>
</html>
